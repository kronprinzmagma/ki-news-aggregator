name: Audio Backfill

# Erzeugt manuell die Audio-Hörfassung eines bestehenden Daily-Issues und lädt
# sie als Release-Asset hoch. Nützlich zum Nachvertonen oder Testen, ohne einen
# kompletten Daily-Lauf (ingest → score → deliver) anzustossen.

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Daily-Datum (YYYY-MM-DD) – leer = letztes Daily-Issue'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  audio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate audio
        run: node scripts/generate-audio.js ${{ github.event.inputs.date }}

      - name: Upload local MP3 artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: audio-${{ github.event.inputs.date || 'latest' }}
          retention-days: 14
          if-no-files-found: ignore
          path: audio-*.mp3
