name: Audio Backfill

# Erzeugt manuell die Audio-Hörfassung eines bestehenden Daily-Issues und lädt
# sie als Release-Asset hoch. Nützlich zum Nachvertonen oder Testen, ohne einen
# kompletten Daily-Lauf (ingest → score → deliver) anzustossen.

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Daily-Datum (YYYY-MM-DD) – leer = letztes Daily-Issue'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  audio:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Generate audio
        run: node scripts/generate-audio.js ${{ github.event.inputs.date }}

      - name: Upload local MP3 artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: audio-${{ github.event.inputs.date || 'latest' }}
          retention-days: 14
          if-no-files-found: ignore
          path: audio-*.mp3
