name: Daily KI-News

on:
  schedule:
    # 05:30 UTC = 07:30 CEST (Sommer) / 06:30 CET (Winter) – Mo–Fr
    - cron: '30 5 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set run date
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Ingest
        run: node ingest.js

      - name: Score
        run: node score.js

      - name: Deliver
        run: node deliver.js

      - name: Upload Run Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ env.RUN_DATE }}
          retention-days: 30
          path: |
            articles-*.json
            scored-*.json
            summary-*.md
            run-summary-*.json
