name: Daily KI-News

on:
  schedule:
    # 05:30 UTC = 07:30 CEST (Sommer) / 06:30 CET (Winter) – täglich
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Laufdatum (YYYY-MM-DD) – leer lässt das heutige UTC-Datum'
        required: false
        default: ''

# Parallele Läufe (Schedule + manueller Dispatch + Watchdog) würden sich
# gegenseitig den SQLite-Cache überschreiben (Last-Write-Wins).
concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Batch API kann bis ~30min dauern für Scoring; ingest + deliver + commit
    # brauchen nochmal ~5min. 45min gibt Puffer ohne grenzwertig zu sein.
    timeout-minutes: 45
    permissions:
      # build-anchors/ wird vom Daily-Run auto-committed
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
      # Optional: ohne diesen Secret wird die Audio-Ausgabe stillschweigend übersprungen.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Wir wollen pushen können
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Set run date
        # Input via env statt direkter ${{ }}-Interpolation im Skript
        # (Actions-Script-Injection-Härtung).
        env:
          RUN_DATE_INPUT: ${{ github.event.inputs.run_date }}
        run: |
          if [ -n "$RUN_DATE_INPUT" ]; then
            echo "RUN_DATE=$RUN_DATE_INPUT" >> $GITHUB_ENV
          else
            echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Restore SQLite run history
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ki-news.db*
          key: ki-news-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ki-news-db-${{ runner.os }}-

      - name: Ingest
        run: node ingest.js

      - name: Score
        run: node score.js

      - name: Deliver
        run: node deliver.js

      - name: Export stats
        # Schreibt assets/stats.json aus der SQLite-DB – Datenquelle für die
        # Stats-Seite im Pages-Archiv (der Pages-Build hat keine DB).
        if: success()
        run: node scripts/export-stats.js

      - name: Commit new build-anchors + stats (if any)
        if: success()
        run: |
          if [ -n "$(git status --porcelain build-anchors/ assets/stats.json 2>/dev/null)" ]; then
            git config user.name "ki-news-bot"
            git config user.email "noreply@github.com"
            git add build-anchors/
            [ -f assets/stats.json ] && git add assets/stats.json
            git commit -m "chore(build-anchors): tageslauf ${RUN_DATE}"
            git push
          else
            echo "Keine neuen Build-Anker/Stats zu committen."
          fi

      - name: Upload Run Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: run-${{ env.RUN_DATE }}
          retention-days: 30
          path: |
            articles-*.json
            scored-*.json
            summary-*.md
            run-summary-*.json

      - name: Save SQLite run history
        if: always() && hashFiles('ki-news.db') != ''
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ki-news.db*
          key: ki-news-db-${{ runner.os }}-${{ github.run_id }}
