name: Daily KI-News

on:
  schedule:
    # 05:30 UTC = 07:30 CEST (Sommer) / 06:30 CET (Winter) – täglich
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Laufdatum (YYYY-MM-DD) – leer lässt das heutige UTC-Datum'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    # Batch API kann bis ~30min dauern für Scoring; ingest + deliver + commit
    # brauchen nochmal ~5min. 45min gibt Puffer ohne grenzwertig zu sein.
    timeout-minutes: 45
    permissions:
      # build-anchors/ wird vom Daily-Run auto-committed
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Wir wollen pushen können
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Set run date
        run: |
          if [ -n "${{ github.event.inputs.run_date }}" ]; then
            echo "RUN_DATE=${{ github.event.inputs.run_date }}" >> $GITHUB_ENV
          else
            echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Ingest
        run: node ingest.js

      - name: Score
        run: node score.js

      - name: Deliver
        run: node deliver.js

      - name: Commit new build-anchors (if any)
        if: success()
        run: |
          if [ -d build-anchors ] && [ -n "$(git status --porcelain build-anchors/)" ]; then
            git config user.name "ki-news-bot"
            git config user.email "noreply@github.com"
            git add build-anchors/
            git commit -m "chore(build-anchors): tageslauf ${RUN_DATE}"
            git push
          else
            echo "Keine neuen Build-Anker zu committen."
          fi

      - name: Upload Run Artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: run-${{ env.RUN_DATE }}
          retention-days: 30
          path: |
            articles-*.json
            scored-*.json
            summary-*.md
            run-summary-*.json
