name: Daily KI-News

on:
  schedule:
    # 16:00 UTC = 18:00 CEST (Sommer) / 17:00 CET (Winter) – Mo–Fr
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ingest
        run: node ingest.js

      - name: Score
        run: node score.js

      - name: Deliver
        run: node deliver.js
