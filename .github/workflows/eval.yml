name: Scoring Eval

on:
  push:
    branches: [main]
    paths:
      - 'score.js'
      - 'lib/config.js'
      - 'lib/scoring.js'
      - 'evals/**'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run Eval
        run: node evals/run_eval.js

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: eval-results-${{ github.sha }}
          path: evals/results/
          retention-days: 90

      - name: Open issue on eval regression
        # run_eval.js endet mit Exit 1, wenn MAE > 1.5 – das ist eine
        # Scoring-Regression, kein Infrastruktur-Fehler. Sichtbar machen,
        # statt nur einen roten Workflow-Haken zu hinterlassen.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --label eval-regression --state open --json number --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            echo "Offenes eval-regression-Issue existiert bereits – kein Duplikat."
            exit 0
          fi
          gh label create eval-regression --repo "$GITHUB_REPOSITORY" --color D93F0B --description "Scoring-Eval unter Schwellwert" 2>/dev/null || true
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --label eval-regression \
            --title "Scoring-Eval-Regression ($(date -u +%Y-%m-%d))" \
            --body "Der Scoring-Eval ist unter den Schwellwert gefallen (MAE > 1.5). Details: [Workflow-Run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) – Artefakt \`eval-results-${GITHUB_SHA}\`. Nächste Schritte: Prompt-Drift in lib/scoring.js prüfen, neue Goldstandard-Einträge auf Plausibilität checken."
