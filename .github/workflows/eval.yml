name: Scoring Eval

on:
  push:
    branches: [main]
    paths:
      - 'score.js'
      - 'lib/config.js'
      - 'lib/scoring.js'
      - 'evals/**'
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Eval
        run: node evals/run_eval.js

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: evals/results/
          retention-days: 90
