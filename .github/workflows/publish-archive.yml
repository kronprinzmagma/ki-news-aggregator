name: Publish Archive

# Baut das statische Pages-Archiv aus allen KI-Daily-/Weekly-Issues
# und deployed nach GitHub Pages.

on:
  # Manuell triggerbar.
  workflow_dispatch:
  # Nach jedem erfolgreichen Daily-Run.
  workflow_run:
    workflows: ['Daily KI-News', 'Weekly KI-Digest']
    types: [completed]
  # Fallback: täglich 09:00 UTC, falls workflow_run aussetzt.
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Skippe wenn der Trigger ein fehlgeschlagener Daily-Run war.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Build archive
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-archive.js

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
