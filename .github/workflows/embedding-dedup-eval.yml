name: Embedding Dedup Eval

# Manuelles A/B-Experiment: Token-Overlap-Heuristik vs. OpenAI-Embeddings
# (evals/embedding_dedup_eval.js). Läuft in CI, weil OPENAI_API_KEY nur als
# Repo-Secret existiert; die articles-*.json kommen aus den Artefakten der
# letzten erfolgreichen Daily-Runs.

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Anzahl letzter Daily-Runs, deren Artikel einfliessen'
        required: false
        default: '14'

permissions:
  contents: read
  actions: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Download articles from recent daily runs
        env:
          GH_TOKEN: ${{ github.token }}
          DAYS_INPUT: ${{ github.event.inputs.days }}
        run: |
          mkdir -p _artifacts
          gh run list --workflow daily-news.yml --status success \
            --limit "${DAYS_INPUT:-14}" --json databaseId --jq '.[].databaseId' \
          | while read -r id; do
              gh run download "$id" --dir "_artifacts/$id" 2>/dev/null || echo "Run $id: kein Artefakt (Retention abgelaufen?)"
            done
          find _artifacts -name 'articles-*.json' -exec cp -n {} . \;
          COUNT=$(ls articles-*.json 2>/dev/null | wc -l)
          echo "$COUNT Tagesdateien eingesammelt"
          if [ "$COUNT" -eq 0 ]; then echo "Keine articles-*.json gefunden" && exit 1; fi

      - name: Run embedding dedup eval
        run: node evals/embedding_dedup_eval.js | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: embedding-dedup-eval-${{ github.run_id }}
          path: evals/results/embedding-dedup-*.json
          retention-days: 90
