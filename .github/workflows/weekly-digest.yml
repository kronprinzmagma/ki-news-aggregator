name: Weekly KI-Digest

on:
  schedule:
    # Sonntags 08:00 UTC = 10:00 CEST (Sommer) / 09:00 CET (Winter)
    # Läuft nach dem Daily (05:30 UTC), damit der Sonntags-Daily bereits vorliegt
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Set run date
        run: echo "RUN_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Weekly Digest
        run: node weekly.js
